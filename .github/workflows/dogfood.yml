name: Dogfood

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - ".github/workflows/dogfood.yml"
  workflow_dispatch:

concurrency:
  group: dogfood-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dogfood:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build

      # --- Scenario: status-preflight-roundtrip ---
      # Exercise the real product: run status, then preflight

      - name: "Step: run-status"
        id: status
        run: |
          # Create a mock Claude project dir so guardian has something to scan
          mkdir -p /tmp/claude-test/.claude/projects
          echo "test log content" > /tmp/claude-test/.claude/projects/test.jsonl
          node dist/cli.js status 2>&1 | tee /tmp/status.log
          if [ $? -eq 0 ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: "Step: run-preflight"
        id: preflight
        run: |
          node dist/cli.js preflight --dry-run 2>&1 | tee /tmp/preflight.log
          if [ $? -eq 0 ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: "Step: verify-output"
        id: verify_output
        run: |
          # Confirm both commands produced meaningful output
          if [ -s /tmp/status.log ] && [ -s /tmp/preflight.log ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi

      # --- Verdict ---

      - name: Determine overall verdict
        id: verdict
        run: |
          S="${{ steps.status.outputs.status }}"
          P="${{ steps.preflight.outputs.status }}"
          V="${{ steps.verify_output.outputs.status }}"
          if [ "$S" = "pass" ] && [ "$P" = "pass" ] && [ "$V" = "pass" ]; then
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
          fi

      # --- Build + dispatch ---

      - name: Build submission
        run: |
          FINISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > /tmp/submission.json << 'INNER_EOF'
          {
            "schema_version": "1.0.0",
            "run_id": "claude-guardian-RUN_ID-ATTEMPT",
            "repo": "REPO_SLUG",
            "ref": {
              "branch": "REF_NAME",
              "commit_sha": "COMMIT_SHA"
            },
            "source": {
              "provider": "github",
              "workflow": "dogfood.yml",
              "provider_run_id": "PROVIDER_RUN_ID",
              "attempt": ATTEMPT_NUM,
              "run_url": "RUN_URL_PLACEHOLDER",
              "actor": "ACTOR_NAME"
            },
            "timing": {
              "started_at": "STARTED_PLACEHOLDER",
              "finished_at": "FINISHED_PLACEHOLDER",
              "duration_ms": 0
            },
            "ci_checks": [],
            "scenario_results": [
              {
                "scenario_id": "status-preflight-roundtrip",
                "scenario_name": "Run status + preflight on mock project",
                "scenario_version": "1.0.0",
                "product_surface": "mcp-server",
                "execution_mode": "bot",
                "verdict": "VERDICT_PLACEHOLDER",
                "step_results": [
                  { "step_id": "run-status", "status": "STATUS_STATUS" },
                  { "step_id": "run-preflight", "status": "PREFLIGHT_STATUS" },
                  { "step_id": "verify-output", "status": "VERIFY_STATUS" }
                ],
                "evidence": [
                  {
                    "kind": "log",
                    "url": "RUN_URL_PLACEHOLDER",
                    "description": "CI run log with status + preflight output"
                  }
                ],
                "notes": "Bot-driven status + preflight roundtrip"
              }
            ],
            "overall_verdict": "VERDICT_PLACEHOLDER",
            "notes": "Phase 2 rollout: claude-guardian MCP dogfood."
          }
          INNER_EOF

          sed -i "s|REPO_SLUG|${GITHUB_REPOSITORY}|g" /tmp/submission.json
          sed -i "s|REF_NAME|${GITHUB_REF_NAME}|g" /tmp/submission.json
          sed -i "s|COMMIT_SHA|${GITHUB_SHA}|g" /tmp/submission.json
          sed -i "s|PROVIDER_RUN_ID|${GITHUB_RUN_ID}|g" /tmp/submission.json
          sed -i "s|ATTEMPT_NUM|${GITHUB_RUN_ATTEMPT}|g" /tmp/submission.json
          sed -i "s|RUN_URL_PLACEHOLDER|https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|g" /tmp/submission.json
          sed -i "s|ACTOR_NAME|${GITHUB_ACTOR}|g" /tmp/submission.json
          sed -i "s|STARTED_PLACEHOLDER|${{ github.event.head_commit.timestamp || github.event.repository.pushed_at }}|g" /tmp/submission.json
          sed -i "s|FINISHED_PLACEHOLDER|${FINISHED_AT}|g" /tmp/submission.json
          sed -i "s|claude-guardian-RUN_ID-ATTEMPT|claude-guardian-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}|g" /tmp/submission.json
          sed -i "s|VERDICT_PLACEHOLDER|${{ steps.verdict.outputs.verdict }}|g" /tmp/submission.json
          sed -i "s|STATUS_STATUS|${{ steps.status.outputs.status }}|g" /tmp/submission.json
          sed -i "s|PREFLIGHT_STATUS|${{ steps.preflight.outputs.status }}|g" /tmp/submission.json
          sed -i "s|VERIFY_STATUS|${{ steps.verify_output.outputs.status }}|g" /tmp/submission.json

          jq empty /tmp/submission.json
          echo "Submission built:"
          jq '.run_id, .overall_verdict' /tmp/submission.json

      - name: Dispatch to testing-os
        env:
          GH_TOKEN: ${{ secrets.DOGFOOD_TOKEN }}
        run: |
          SUBMISSION=$(cat /tmp/submission.json)
          RUN_ID=$(echo "$SUBMISSION" | jq -r '.run_id')

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::DOGFOOD_TOKEN not set — skipping dispatch"
            exit 0
          fi

          jq -n --argjson sub "$SUBMISSION" \
            '{"event_type":"dogfood_submission","client_payload":{"submission":$sub}}' \
            | gh api repos/dogfood-lab/testing-os/dispatches \
              --input - --silent

          echo "Dispatched $RUN_ID to testing-os"
